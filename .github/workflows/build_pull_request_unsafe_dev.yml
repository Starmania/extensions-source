name: PR unsafe-dev publish

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**'
      - '!**.md'
      - '!.github/**'
      - '.github/authorized_contributors.json'
      - '.github/scripts/**'
      - '.github/workflows/build_pull_request_unsafe_dev.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CI_CHUNK_SIZE: 65
  IS_PR_CHECK: true

jobs:
  prepare:
    name: Prepare job
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      matrix: ${{ steps.generate-matrices.outputs.matrix || '{"chunk":[]}' }}
      delete: ${{ steps.generate-matrices.outputs.delete || '[]' }}
      authorized: ${{ steps.authorize.outputs.authorized }}
      authorization_reason: ${{ steps.authorize.outputs.reason }}
    steps:
      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.ref }}

      - id: authorize
        name: Authorize PR author
        run: |
          python ./.github/scripts/check-pr-authorized.py \
            "${{ github.event.pull_request.user.login }}" \
            "${{ github.event.pull_request.author_association }}" \
            ./.github/authorized_contributors.json

      - id: generate-matrices
        if: ${{ steps.authorize.outputs.authorized == 'true' }}
        name: Generate build matrices
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          git fetch origin "pull/${{ github.event.pull_request.number }}/head:pr_head"
          git checkout --detach pr_head
          python ./.github/scripts/generate-build-matrices.py "origin/${{ github.event.pull_request.base.ref }}" Release

  build:
    name: Build extensions (${{ matrix.chunk.number }})
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ needs.prepare.outputs.authorized == 'true' && toJson(fromJson(needs.prepare.outputs.matrix).chunk) != '[]' }}
    strategy:
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-read-only: true

      - name: Prepare signing key
        run: |
          echo ${{ secrets.TEST_SIGNING_KEY }} | base64 -d > signingkey.jks

      - name: Build extensions (${{ matrix.chunk.number }})
        env:
          MODULES: ${{ join(matrix.chunk.modules, ' ') }}
          ALIAS: ${{ secrets.TEST_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.TEST_KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.TEST_KEY_PASSWORD }}
          FORCED_VERSION_NAME: 1.4.99
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          ./gradlew $MODULES

      - name: Upload APKs (${{ matrix.chunk.number }})
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: "github.repository == 'keiyoushi/extensions-source'"
        with:
          name: "individual-apks-${{ matrix.chunk.number }}"
          path: "**/*.apk"
          retention-days: 1

      - name: Clean up CI files
        run: rm signingkey.jks

  publish:
    name: Publish unsafe-dev extension repo
    needs: [prepare, build]
    if: "github.repository == 'keiyoushi/extensions-source' && needs.prepare.outputs.authorized == 'true'"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download APK artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ~/apk-artifacts

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 17
          distribution: temurin

      - name: Checkout base branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: main
          persist-credentials: false

      - name: Create repo artifacts
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          cd main
          python ./.github/scripts/move-built-apks.py
          INSPECTOR_LINK="$(curl -s "https://api.github.com/repos/keiyoushi/extensions-inspector/releases/latest" | jq -r '.assets[0].browser_download_url')"
          curl -L "$INSPECTOR_LINK" -o ./Inspector.jar
          java -jar ./Inspector.jar "repo/apk" "output.json" "tmp"
          python ./.github/scripts/create-repo.py

      - name: Checkout unsafe-dev repo branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: keiyoushi/extensions-unsafe-dev
          token: ${{ secrets.TEST_BOT_PAT }}
          ref: repo
          path: repo
          persist-credentials: true

      - name: Merge and deploy repo
        env:
          DELETE: ${{ needs.prepare.outputs.delete }}
          TARGET_REPO_SLUG: keiyoushi/extensions-unsafe-dev
        run: |
          cd repo
          python ../main/.github/scripts/merge-repo.py "$DELETE"
          ../main/.github/scripts/commit-repo.sh
